<svg width="100%" viewBox="0 0 680 520">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Raw integer address -->
<g class="c-gray">
  <rect x="40" y="30" width="200" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="140" y="51" text-anchor="middle" dominant-baseline="central">Raw integer address</text>
  <text class="ts" x="140" y="69" text-anchor="middle" dominant-baseline="central">~73,000-bit number</text>
</g>

<!-- Arrow down -->
<line x1="140" y1="84" x2="140" y2="122" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="148" y="108" dominant-baseline="central">decompose</text>

<!-- Factored dimensions box -->
<g class="c-purple">
  <rect x="40" y="122" width="200" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="140" y="143" text-anchor="middle" dominant-baseline="central">Factor into D dimensions</text>
  <text class="ts" x="140" y="161" text-anchor="middle" dominant-baseline="central">addr = d0 + B*d1 + B²*d2…</text>
</g>

<!-- Arrow to vector -->
<line x1="242" y1="149" x2="300" y2="149" class="arr" marker-end="url(#arrow)"/>

<!-- Vector components -->
<g class="c-teal">
  <rect x="300" y="30" width="110" height="238" rx="8" stroke-width="0.5"/>
  <text class="th" x="355" y="54" text-anchor="middle" dominant-baseline="central">d₀</text>
  <text class="ts" x="355" y="72" text-anchor="middle" dominant-baseline="central">dim 0</text>
  <rect x="314" y="86" width="82" height="28" rx="4" stroke-width="0.5"/>
  <text class="ts" x="355" y="100" text-anchor="middle" dominant-baseline="central">0…(B-1)</text>

  <text class="th" x="355" y="138" text-anchor="middle" dominant-baseline="central">d₁</text>
  <text class="ts" x="355" y="156" text-anchor="middle" dominant-baseline="central">dim 1</text>
  <rect x="314" y="170" width="82" height="28" rx="4" stroke-width="0.5"/>
  <text class="ts" x="355" y="184" text-anchor="middle" dominant-baseline="central">0…(B-1)</text>

  <text class="th" x="355" y="222" text-anchor="middle" dominant-baseline="central">d₂…dₙ</text>
  <text class="ts" x="355" y="240" text-anchor="middle" dominant-baseline="central">D total dims</text>
</g>

<!-- Arrow to final address -->
<line x1="412" y1="149" x2="460" y2="149" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="427" y="138" dominant-baseline="central">encode</text>

<!-- Final fixed-length label -->
<g class="c-coral">
  <rect x="460" y="30" width="180" height="238" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="54" text-anchor="middle" dominant-baseline="central">Fixed-length label</text>
  <text class="ts" x="550" y="72" text-anchor="middle" dominant-baseline="central">D × ceil(log₉₇(B)) chars</text>

  <rect x="474" y="90" width="152" height="26" rx="4" stroke-width="0.5"/>
  <text class="ts" x="550" y="103" text-anchor="middle" dominant-baseline="central">component 0: 8 chars</text>
  <rect x="474" y="124" width="152" height="26" rx="4" stroke-width="0.5"/>
  <text class="ts" x="550" y="137" text-anchor="middle" dominant-baseline="central">component 1: 8 chars</text>
  <rect x="474" y="158" width="152" height="26" rx="4" stroke-width="0.5"/>
  <text class="ts" x="550" y="171" text-anchor="middle" dominant-baseline="central">component 2: 8 chars</text>
  <rect x="474" y="192" width="152" height="26" rx="4" stroke-width="0.5"/>
  <text class="ts" x="550" y="205" text-anchor="middle" dominant-baseline="central">…</text>
  <text class="ts" x="550" y="236" text-anchor="middle" dominant-baseline="central">always same total length</text>
</g>

<!-- Divider -->
<line x1="40" y1="310" x2="640" y2="310" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

<!-- GPU section label -->
<text class="th" x="40" y="340" dominant-baseline="central">GPU / GLSL path</text>

<!-- GPU boxes -->
<g class="c-amber">
  <rect x="40" y="360" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="376" text-anchor="middle" dominant-baseline="central">Address int</text>
  <text class="ts" x="110" y="394" text-anchor="middle" dominant-baseline="central">on CPU</text>
</g>

<line x1="182" y1="382" x2="216" y2="382" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="218" y="360" width="160" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="298" y="376" text-anchor="middle" dominant-baseline="central">vec4 / ivec4 upload</text>
  <text class="ts" x="298" y="394" text-anchor="middle" dominant-baseline="central">4×32-bit components</text>
</g>

<line x1="380" y1="382" x2="414" y2="382" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="416" y="360" width="178" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="505" y="376" text-anchor="middle" dominant-baseline="central">GLSL shader</text>
  <text class="ts" x="505" y="394" text-anchor="middle" dominant-baseline="central">parallel dim ops</text>
</g>

<!-- GPU note -->
<text class="ts" x="40" y="440" dominant-baseline="central">Each dimension is an independent integer — maps cleanly to GLSL ivec / uvec components.</text>
<text class="ts" x="40" y="462" dominant-baseline="central">Thousands of addresses processed in parallel across shader invocations.</text>
<text class="ts" x="40" y="484" dominant-baseline="central">No SHA dependency — pure modular arithmetic you define and own.</text>
</svg>
