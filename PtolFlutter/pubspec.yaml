name: ptolemy
description: H_hat_RB Field Engine — learn(), hear(), speak()
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # FFI — C interop
  ffi: ^2.1.0

  # Platform paths — documents dir for checkpoint
  path_provider: ^2.1.3

  # File picker — learn from file on disk
  file_picker: ^8.0.7

  # HTTP — learn from URL
  http: ^1.2.0

  # Share checkpoint file
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/monad_wordnet.bin

  # No fonts — use system monospace
